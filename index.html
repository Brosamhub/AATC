<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>...And Around the Corner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="game">
    <canvas id="gameCanvas"></canvas>

    <div id="controls">
      <div id="dpad">
        <button class="ctrl-btn" data-ctrl="up" aria-label="Up">▲</button>
        <button class="ctrl-btn" data-ctrl="left" aria-label="Left">◀</button>
        <button class="ctrl-btn" data-ctrl="right" aria-label="Right">▶</button>
        <button class="ctrl-btn" data-ctrl="down" aria-label="Down">▼</button>
      </div>
      <div id="actionpad">
        <button class="ctrl-btn" data-ctrl="forward" aria-label="Forward">FWD</button>
        <button class="ctrl-btn" data-ctrl="rotateCCW" aria-label="Rotate CCW">↺</button>
        <button class="ctrl-btn" data-ctrl="rotateCW" aria-label="Rotate CW">↻</button>
        <button class="ctrl-btn" data-ctrl="back" aria-label="Back">BACK</button>
      </div>
    </div>

    <div id="overlay" class="hidden">
      <div id="overlay-content">
        <h1 id="overlay-title">Game Over</h1>
        <p id="overlay-msg"></p>
        <button id="restart-btn">Try Again</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
